name: Compilar para macOS

on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Descargar el código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar librerías necesarias
      run: |
        python -m pip install --upgrade pip
        pip install openpyxl pyexcel-ods3 pyinstaller

    - name: Generar binario con PyInstaller
      run: |
        pyinstaller --target-architecture universal2 --windowed --clean --onefile ExportGradesCVtoUXXI.py

    - name: Guardar el archivo generado
      uses: actions/upload-artifact@v4
      with:
        name: App-macOS-Universal
        path: dist/ExportGradesCVtoUXXI.app
